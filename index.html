<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doğum Günü Sürprizi</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #121212;
            background-image: radial-gradient(circle at center, #2c1a30 0%, #121212 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        /* Üstteki Doğum Günü Mesaj Alanı */
        .message-box {
            font-size: 22px;
            min-height: 90px;
            margin-bottom: 20px;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            transition: opacity 0.3s ease, transform 0.3s ease;
            color: #ffb6c1;
        }

        /* Kalp Alanı */
        .heart-wrapper {
            cursor: pointer;
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
            user-select: none;
        }

        .heart {
            font-size: 90px;
            color: #ff2a6d;
            filter: drop-shadow(0 0 10px rgba(255, 42, 109, 0.6));
            animation: beat 1.2s infinite ease-in-out;
            transform-origin: center;
            transition: transform 0.1s ease;
        }

        .heart-wrapper:active .heart {
            transform: scale(0.85);
        }

        /* Kalbin Altındaki Yazı */
        .click-hint {
            font-size: 15px;
            color: #aaa;
            margin-bottom: 40px;
            letter-spacing: 1px;
            font-weight: 500;
        }

        /* Barların Kapsayıcısı */
        .bars-container {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: space-between;
        }

        /* Soluk Durumdaki Barlar */
        .bar {
            flex: 1;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Barın İçindeki Doluluk Efekti (Pembeleşme) */
        .bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff758c 0%, #ff7eb3 100%);
            box-shadow: 0 0 10px rgba(255, 126, 179, 0.8);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Kalp Atış Hızı Animasyonu */
        @keyframes beat {
            0% { transform: scale(1); }
            25% { transform: scale(1.1); }
            40% { transform: scale(1); }
            60% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* Kutlama Konfeti Efekti */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: fall 3s linear infinite;
            pointer-events: none;
            opacity: 0;
        }

        @keyframes fall {
            0% { transform: translateY(-5vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="main-content">
        <!-- Doğum Günü Mesajı (En Üstte) -->
        <div class="message-box" id="messageBox">
            İlk siteye girdiğinde yine doğum günü mesajı olucak...
        </div>

        <!-- Kalp Emoji (Ortada) -->
        <div class="heart-wrapper" onclick="increasePulse()">
            <div class="heart" id="heartElement">❤️</div>
        </div>
        
        <!-- Kalbin Altındaki Yazı -->
        <div class="click-hint" id="clickHint">nabzı arttırmak için tıkla</div>

        <!-- Soluk Başlayan Barlar (En Altta) -->
        <div class="bars-container">
            <div class="bar"><div class="bar-fill" id="fill1"></div></div>
            <div class="bar"><div class="bar-fill" id="fill2"></div></div>
            <div class="bar"><div class="bar-fill" id="fill3"></div></div>
            <div class="bar"><div class="bar-fill" id="fill4"></div></div>
            <div class="bar"><div class="bar-fill" id="fill5"></div></div>
        </div>
    </div>

    <script>
        let currentStage = 0;
        const totalStages = 5;

        // Barlar doldukça sırasıyla değişecek mesajlar
        const messages = [
            "İlk siteye girdiğinde yine doğum günü mesajı olucak...",
            "Bak, dokunuşunla nabzım hızlanmaya başladı bile! 👀💗",
            "Barlar doluyor, içimdeki heyecan giderek katlanıyor... ✨",
            "Seninle geçen her an, kalbimin en tatlı ritmi oldu. 🥰",
            "Nabız en yüksek seviyede! Tamamen senin için atıyor! 🔥💓",
            "DOĞUM GÜNÜN KUTLU OLSUN! 🎂🎉 İyi ki varsın, iyi ki doğdun sevgilim! 💖"
        ];

        // Kalp atış hızları (Tıkladıkça animasyon süresi kısalır, kalp hızlanır)
        const heartSpeeds = ["1.2s", "0.9s", "0.7s", "0.5s", "0.3s", "0.15s"];

        function increasePulse() {
            if (currentStage >= totalStages) return;

            currentStage++;
            
            // Sıradaki barı bul ve doldur
            const currentBarFill = document.getElementById(`fill${currentStage}`);
            if (currentBarFill) {
                currentBarFill.style.width = "100%";
            }

            // Üstteki mesajı pürüzsüzce değiştir
            const messageBox = document.getElementById('messageBox');
            messageBox.style.opacity = 0;
            messageBox.style.transform = "scale(0.95)";
            
            setTimeout(() => {
                messageBox.innerText = messages[currentStage];
                messageBox.style.opacity = 1;
                messageBox.style.transform = "scale(1)";
            }, 300);

            // Kalbin atış hızını güncelle
            const heart = document.getElementById('heartElement');
            heart.style.animationDuration = heartSpeeds[currentStage];

            // Tüm barlar dolduğunda konfetileri başlat
            if (currentStage === totalStages) {
                startCelebration();
            }
        }

        function startCelebration() {
            document.getElementById('clickHint').innerText = "Tüm kalbimle seni seviyorum!";
            
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.classList.add('confetti');
                    
                    const colors = ['#ff7eb3', '#ff758c', '#ff2a6d', '#ffb6c1', '#fff'];
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    confetti.style.opacity = Math.random();
                    
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => { confetti.remove(); }, 3000);
                }, i * 100);
            }
        }
    </script>
</body>
</html>
